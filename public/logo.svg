<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 둥근 사각 배경 (브랜드 블루 그라데이션) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- 배경: 둥근 사각형 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 뒤쪽 서류 그림자 -->
  <rect x="14" y="13" width="32" height="40" rx="3" fill="#000" opacity="0.18"/>

  <!-- 서류(급여명세서) -->
  <rect x="16" y="11" width="32" height="40" rx="3" fill="url(#paper)"/>

  <!-- 서류 상단 헤더 라인 -->
  <rect x="20" y="16" width="14" height="2.5" rx="1.25" fill="#94a3b8"/>
  <rect x="20" y="21" width="20" height="1.5" rx="0.75" fill="#cbd5e1"/>

  <!-- ₩ 골드 원형 배지 -->
  <circle cx="38" cy="34" r="11" fill="#fbbf24" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="38" y="39.5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="15" font-weight="900" fill="#78350f">₩</text>

  <!-- 서류 하단 라인 (디테일) -->
  <rect x="20" y="44" width="10" height="1.5" rx="0.75" fill="#cbd5e1"/>
</svg>
